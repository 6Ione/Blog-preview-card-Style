<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;700;800&display=swap">
  <title>Frontend Mentor | Blog preview card</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
    .body {
      font-family: 'Figtree', sans-serif;
      font-weight: 800;
      background-color: hsl(47, 88%, 63%)
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      flex-direction: column;
      background-color: hsl(0, 0%, 100%);
      border-radius: 20px;
      border: 1px solid hsl(0, 0%, 0%);
      box-shadow: 8px 8px 0px hsl(0, 0%, 0%);  /* solid, no blur */
      max-width: 350px;

      padding: 25px 20px;
    }

    .card-image img {
      width: 100%;
      border-radius: 15px;
    }

    .card-category span {
      display: inline-block;
      font-weight: bold;
      margin-top: 25px;
      background-color: hsl(47, 88%, 63%);
      border-radius: 5px;
      padding: 5px 10px;
    }

    .card-published span {
      display: inline-block;
      margin-top: 15px;
      font-weight: 500;
    }

    .card-content h1 {
      display: inline-block;
      font-size: 1.5rem;
      font-weight: 800;
    }
    .card-content p {
      color: hsl(0, 0%, 42%);
      font-weight: 500;
      margin-bottom: 25px;
    }

    .author img {
      width: 30px;
      height: 30px;
      border-radius: 50%;
    }
    .author {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* mobile viewport */
    @media (max-width: 375px) {
      .card {
        max-width: 100%;
        margin: 0 20px;
      }

    }

    @media (min-width: 1440px) {
      .card {
        max-width: 350px;
      }
    }
  </style>
</head>
<body class="body">
  <main>
    <div class="container">
      <div class="card">
        <div class="card-image">
          <img src="./assets/images/illustration-article.svg" alt="Web 3.0 image">
        </div>
        <div class="card-category">
          <span>Learning</span>
        </div>
        <div class="card-published">
          <span>Published 21 Dec 2023</span>
        </div>
        <div class="card-content">
          <h1>HTML & CSS foundations</h1>
          <p>These languages are the backbone of every website, defining structure, content, and presentation.</p>
          
          <div class="author">
            <img src="./assets/images/image-avatar.webp" alt="Greg avatar">
            <span>Greg Hooper</span>
          </div>

        </div>

      </div>
    </div>
  </main>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Capo</a>.
  </footer>
</body>
</html>
